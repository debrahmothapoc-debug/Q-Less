# render.yaml — Q-Less Full Stack Deployment

services:
  # ── Backend API (Node.js / Express) ─────────────────────
  - type: web
    name: qless-api
    runtime: node
    region: oregon
    plan: free
    rootDir: qless-backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DB_HOST
        fromDatabase:
          name: qless-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: qless-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: qless-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: qless-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: qless-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        value: https://qless-frontend.onrender.com

  # ── Frontend (React / Vite static site) ─────────────────
  - type: web
    name: qless-frontend
    runtime: static
    plan: free
    rootDir: qless-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://qless-api.onrender.com

# ── PostgreSQL Database ──────────────────────────────────
databases:
  - name: qless-db
    databaseName: qless_db
    user: qless_user
    plan: free
